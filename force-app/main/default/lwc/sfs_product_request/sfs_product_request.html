<template>
    

    <div class="container">
        <div class="heading-transaction">
            <div class="slds-grid slds-wrap heading-pad">
                <div class="slds-size_2-of-2">
                <h1 class="title-service" style="text-align : center;">Spare Parts</h1>
                <lightning-button class="slds-float_right" variant="brand" label="Save" title="Save" onclick={handleSave}></lightning-button>
                <!--div class="slds-size_2-of-2">
                    <div style="padding: 0.50rem 1rem; height: 50px;">
                        <lightning-button class="slds-float_right" variant="brand" label="Save" title="Save" disabled={disableSave} onclick={handleSave}></lightning-button>
                    </div-->
                </div>
            </div>
        </div>

        <div class="slds-col slds-size_8-of-8 slds-m-bottom--medium">
            <lightning-Input type="search" placeholder="Search..." value={productName} name="ProductName" onchange={handleChangeProductName}></lightning-input>
        </div>
        <lightning-spinner alternative-text="Loading" size="medium" if:true={isLoading}></lightning-spinner>
        <!--c-lookup-cmp variant="label-hidden" label="" name="product" value={account} valueof-product={accountName} field-name="Name" obj-name="Account" search-placeholder="Search Account" icon-name="standard:account" onlookupselected={handleSelectionAccount}> </c-lookup-cmp>
        <lightning-input type="date" name="input1" placeholder="Enter a date" label="Schedule Date" value={scheduleDate} onchange={handleInputChange}></lightning-input-->

        

        <template if:true={isProductList}>
            <div class="slds-card" style="font-family: 'Open Sans', sans-serif;width: 100%;height: 100%;">
                <table class="slds-table slds-table_bordered slds-no-row-hover slds-table_cell-buffer" role="grid">
                <thead>
                <tr>
                    <th scope="col" height="22" style="text-align: center;">Product</th>
                    <th scope="col" height="22" style="text-align: center;">Available</th>
                    <th scope="col" height="22" style="text-align: center;">Quantity</th>
                </tr>
                </thead>
                <tbody>
                <template for:each={productWithQuantity} for:item="rec" for:index="index">
                    <tr key={rec} class="slds-hint-parent">
                        <td>
                            {rec.Name}
                            
                        </td>
                        <td>
                            {rec.QuantityOnHand}
                            
                        </td>
                        <td><lightning-input type="number" variant="label-hidden" label="" data-id={rec.Id} name="Quantity" value={rec.Quantity} onchange={handleInputChange}></lightning-input></td>
                    </tr>
                </template>
                </tbody>
            </table>
            </div>
        </template>
    </div>
</template>
